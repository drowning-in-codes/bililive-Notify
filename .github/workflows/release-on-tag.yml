name: Build and Release on Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer artifacts
        run: npm run make

      - name: Package squirrel output
        shell: pwsh
        run: |
          $sourceDir = "out/make/squirrel.windows/x64"
          if (!(Test-Path $sourceDir)) {
            throw "Build output path not found: $sourceDir"
          }

          $artifactName = "bililive-notify-${{ github.ref_name }}-squirrel-windows-x64.zip"
          Compress-Archive -Path "$sourceDir/*" -DestinationPath $artifactName -Force
          "ARTIFACT_ZIP=$artifactName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ARTIFACT_ZIP }}
